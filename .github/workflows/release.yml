name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build desktop app bundle
        working-directory: backend
        run: npx --prefix ../frontend tauri build

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: backend/target/release/bundle/**
          if-no-files-found: error

  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Initialize Android project
        working-directory: backend
        run: npx --prefix ../frontend tauri android init --ci

      - name: Apply SiteSurveyor Android launcher icons
        run: |
          RES_DIR=backend/gen/android/app/src/main/res
          mkdir -p "$RES_DIR/mipmap-anydpi-v26"
          mkdir -p "$RES_DIR/values"
          mkdir -p "$RES_DIR/mipmap-hdpi"
          mkdir -p "$RES_DIR/mipmap-mdpi"
          mkdir -p "$RES_DIR/mipmap-xhdpi"
          mkdir -p "$RES_DIR/mipmap-xxhdpi"
          mkdir -p "$RES_DIR/mipmap-xxxhdpi"
          cp -f backend/icons/android/mipmap-anydpi-v26/ic_launcher.xml "$RES_DIR/mipmap-anydpi-v26/ic_launcher.xml"
          cp -f backend/icons/android/mipmap-anydpi-v26/ic_launcher_round.xml "$RES_DIR/mipmap-anydpi-v26/ic_launcher_round.xml"
          cp -f backend/icons/android/values/ic_launcher_background.xml "$RES_DIR/values/ic_launcher_background.xml"
          cp -f backend/icons/android/mipmap-hdpi/ic_launcher.png "$RES_DIR/mipmap-hdpi/ic_launcher.png"
          cp -f backend/icons/android/mipmap-hdpi/ic_launcher_round.png "$RES_DIR/mipmap-hdpi/ic_launcher_round.png"
          cp -f backend/icons/android/mipmap-hdpi/ic_launcher_foreground.png "$RES_DIR/mipmap-hdpi/ic_launcher_foreground.png"
          cp -f backend/icons/android/mipmap-mdpi/ic_launcher.png "$RES_DIR/mipmap-mdpi/ic_launcher.png"
          cp -f backend/icons/android/mipmap-mdpi/ic_launcher_round.png "$RES_DIR/mipmap-mdpi/ic_launcher_round.png"
          cp -f backend/icons/android/mipmap-mdpi/ic_launcher_foreground.png "$RES_DIR/mipmap-mdpi/ic_launcher_foreground.png"
          cp -f backend/icons/android/mipmap-xhdpi/ic_launcher.png "$RES_DIR/mipmap-xhdpi/ic_launcher.png"
          cp -f backend/icons/android/mipmap-xhdpi/ic_launcher_round.png "$RES_DIR/mipmap-xhdpi/ic_launcher_round.png"
          cp -f backend/icons/android/mipmap-xhdpi/ic_launcher_foreground.png "$RES_DIR/mipmap-xhdpi/ic_launcher_foreground.png"
          cp -f backend/icons/android/mipmap-xxhdpi/ic_launcher.png "$RES_DIR/mipmap-xxhdpi/ic_launcher.png"
          cp -f backend/icons/android/mipmap-xxhdpi/ic_launcher_round.png "$RES_DIR/mipmap-xxhdpi/ic_launcher_round.png"
          cp -f backend/icons/android/mipmap-xxhdpi/ic_launcher_foreground.png "$RES_DIR/mipmap-xxhdpi/ic_launcher_foreground.png"
          cp -f backend/icons/android/mipmap-xxxhdpi/ic_launcher.png "$RES_DIR/mipmap-xxxhdpi/ic_launcher.png"
          cp -f backend/icons/android/mipmap-xxxhdpi/ic_launcher_round.png "$RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png"
          cp -f backend/icons/android/mipmap-xxxhdpi/ic_launcher_foreground.png "$RES_DIR/mipmap-xxxhdpi/ic_launcher_foreground.png"

      - name: Setup Android signing
        working-directory: backend/gen/android
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$ANDROID_KEY_BASE64"
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "password=$ANDROID_KEY_PASSWORD" >> keystore.properties
          base64 -d <<< "$ANDROID_KEY_BASE64" > "$RUNNER_TEMP/keystore.jks"
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build Android artifacts
        working-directory: backend
        run: npx --prefix ../frontend tauri android build --apk --aab

      - name: Sign release APK
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          UNSIGNED_APK="backend/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          SIGNED_APK="backend/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          APKSIGNER="$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | awk 'END{print}')"
          test -f "$UNSIGNED_APK"
          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/keystore.jks" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEY_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"
          "$APKSIGNER" verify --print-certs "$SIGNED_APK"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            backend/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
            backend/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [desktop, android]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.dmg
            release-artifacts/**/*-setup.exe
            release-artifacts/**/*.msi
            release-artifacts/**/app-universal-release.apk
            release-artifacts/**/*.aab
          draft: false
          prerelease: false
